name: Deploy to servers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/docker.pem
          chmod 600 ~/.ssh/docker.pem
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy via node-04
        run: |
          ssh -i ~/.ssh/docker.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.NODE04_IP }} \
            "cd ~/auto-ops-platform && git pull origin main && ansible-galaxy collection install community.docker && ansible-playbook -i ansible/inventory.ini ansible/playbook.yml"
