---
- name: Deploy node-01 (monitoring)
  hosts: monitoring
  become: true
  tasks:
    - name: Create app directory
      file:
        path: /opt/node-01
        state: directory

    - name: Copy docker-compose files
      copy:
        src: ../docker/node-01/
        dest: /opt/node-01/

    - name: Docker compose up
      community.docker.docker_compose_v2:
        project_src: /opt/node-01
        state: present

